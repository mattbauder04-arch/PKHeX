name: Build PKHeX

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Build
        run: dotnet build PKHeX.sln -c Release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PKHeX
          path: PKHeX.WinForms/bin/Release/net10.0-windows/
